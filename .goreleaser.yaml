# GoReleaser configuration
# See https://goreleaser.com for documentation

version: 2

before:
  hooks:
    - go mod tidy
    - go mod download

snapshot:
  version_template: "{{ incpatch .Version }}"

builds:
  # Hooktun Server
  - id: relay
    main: ./cmd/relay
    binary: hooktun
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

  # Hooktun Client
  - id: client
    main: ./cmd/client
    binary: hooktun-client
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

dockers_v2:
  - id: client
    ids:
      - client
    dockerfile: deployments/Dockerfile.client
    images:
      - "ghcr.io/adrianokf/hooktun-client"
    tags:
      - "v{{ .Version }}"
      - "{{ if .IsNightly }}nightly{{ end }}"
      - "{{ if not .IsNightly }}latest{{ end }}"
    labels:
      "org.opencontainers.image.description": "Hooktun Client - Webhook tunnel client"
      "org.opencontainers.image.source": "{{ .GitURL }}"
      "org.opencontainers.image.version": "{{ .Version }}"
      "org.opencontainers.image.created": "{{ .Date }}"
      "org.opencontainers.image.revision": "{{ .FullCommit }}"
