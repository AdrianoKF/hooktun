app = 'go-webhook-relay'
primary_region = 'fra'

[build]
dockerfile = "deployments/Dockerfile"

[env]
PORT = '8080'

[http_service]
internal_port = 8080
force_https = true
auto_stop_machines = 'stop'
auto_start_machines = true
min_machines_running = 0
processes = ['app']

[[vm]]
memory = '256mb'
cpus = 1
memory_mb = 256
